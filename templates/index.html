<!DOCTYPE html>
<html>

<head>

    <title>DENARIUS</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

    <div class="brand">

        <div class="logo">

            <img src="{{ url_for('static', filename='logo.png') }}" alt="Denarius Logo">

        </div>

        <h1>DENARIUS</h1>

        <h2>Global Currency Exchange</h2>

    </div>

    <form method="POST">

        <div class="form-group">

            <label>From:</label>

            <select name="from_currency">

                {% for code, name in currencies.items() %}

<option value="{{ code }}"
{% if code == from_currency %}selected{% endif %}>

    {{ name }}

</option>

{% endfor %}

            </select>

        </div>

        <div class="swap-container">

            <button type="submit" name="action" value="swap" class="swap-btn">

                ⇅

            </button>

        </div>

        <div class="form-group">

            <label>To:</label>

            <select name="to_currency">

                {% for code, name in currencies.items() %}

<option value="{{ code }}"
{% if code == to_currency %}selected{% endif %}>

    {{ name }}

</option>

{% endfor %}

            </select>

        </div>

        <div class="form-group">

            <label>Amount:</label>

            <input
                type="number"
                name="amount"
                value="{{ amount if amount else 100 }}"
                step="0.01">

        </div>

        <button type="submit">

            Convert

        </button>

    </form>

    {% if error %}

    <div class="error">

        {{ error }}

    </div>

    {% endif %}

    {% if rate %}

    <div class="result-box">

        <h3>Exchange Rate</h3>

        <p>

            1 {{ from_currency }} = {{ rate }} {{ to_currency }}

        </p>

    </div>

    {% endif %}

    {% if result %}

    <div class="result-box">

        <h3>Result</h3>

        <p class="conversion">

            <span class="amount">

                {{ amount }} {{ from_currency }}

            </span>

            <span class="arrow">

                ↓

            </span>

            <span class="amount">

                {{ "%.2f"|format(result) }} {{ to_currency }}

            </span>

        </p>

    </div>

    {% endif %}

</div>

</body>

</html>
